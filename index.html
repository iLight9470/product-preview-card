<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style></style>
  </head>
  <body>
    <div class="container">
      <div class="desk-image">
        <img
          src="./images/image-product-desktop.jpg"
          alt="Product Preview Card Component"
        />
      </div>
        <div class="card">
          <p>PERFUME</p>
            <div class="card-info">
            <h1>Gabrielle Essence Eau De Parfum</h1>
              <p class="description">A floral, solar and voluptuous interpretation composed by Olivier
                Polge, Perfumer-Creator for the House of CHANEL.
              </p>
            <div class="price-row">
              <span class="after-price">$149.99</span>
              <span class="before-price">$169.99</span>
            </div>
          <button>&#128722;Add to Cart</button>
        </div>
    </div>
  </body>
</html>
